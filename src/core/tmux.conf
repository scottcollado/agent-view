# Agent View - custom tmux configuration
# Loaded instead of the user's ~/.tmux.conf to prevent keyboard shortcut conflicts.
# This file is installed to ~/.agent-view/tmux.conf at runtime.
#
# Reserved keybinds (avoid overriding in tmux-user.conf):
#   ``      - detach (double-tap backtick)
#   Ctrl+K  - command palette
#   Ctrl+L  - session list
#   Ctrl+T  - toggle terminal pane
#   Ctrl+O  - toggle pane focus
#   Ctrl+]  - next session
#   Ctrl+\  - previous session

# --- Mouse ---
# Enable mouse so trackpad scroll passes through to the TUI app
# instead of entering tmux copy mode
set-option -g mouse on

# --- Keybindings ---
# Double-tap backtick to detach: first ` sets prefix, second ` detaches
set-option -g prefix `
bind-key ` detach-client
# Still allow typing a literal backtick with prefix then a
bind-key a send-prefix
bind-key -n C-k run-shell "touch /tmp/agent-view-cmd-palette" \; detach-client
bind-key -n C-t if-shell "[ $(tmux display -p '#{window_panes}') -eq 1 ]" "split-window -v" "kill-pane -t :.1"
bind-key -n C-o select-pane -t :.+

# Session switching (no prefix needed)
bind-key -n C-] switch-client -n
bind-key -n 'C-\' switch-client -p
bind-key -n C-l run-shell "touch /tmp/agent-view-session-list" \; detach-client

# --- Status bar ---
set-option -g status on
set-option -g status-position bottom
set-option -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set-option -g status-left "#[fg=#a6e3a1,bold] #{window_name} #[fg=#6c7086]| "
set-option -g status-left-length 30
set-option -g status-right-length 120
set-option -g status-right "#[fg=#89b4fa]Ctrl+]/\\#[fg=#6c7086] switch  #[fg=#89b4fa]Ctrl+L#[fg=#6c7086] list  #[fg=#89b4fa]Ctrl+T#[fg=#6c7086] term  #[fg=#89b4fa]Ctrl+K#[fg=#6c7086] cmd  #[fg=#89b4fa]``#[fg=#6c7086] detach"

# --- Terminal titles ---
set-option -g set-titles on
set-option -g set-titles-string "#{window_name}"

# --- User customizations ---
# Create ~/.agent-view/tmux-user.conf to add your own settings
if-shell "[ -f ~/.agent-view/tmux-user.conf ]" "source-file ~/.agent-view/tmux-user.conf"
